{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

<div class="d-flex justify-content-between align-items-center mb-3">

<h2 class="text-white">My Notes</h2>

<a href="{% url 'add_note' %}" class="btn btn-primary">
➕ Add Note
</a>

</div>


<input
type="text"
placeholder="Search notes..."
class="form-control mb-4"
id="searchNotes">


<div class="row">

{% for note in notes %}

<div class="col-md-4 mb-3">

<div class="card shadow h-100">

<div class="card-body">

<h5 class="text-white">{{ note.title }}</h5>

<p class="text-info">
{{ note.subject }}
</p>

<p class="text-light">
{{ note.content|truncatechars:120 }}
</p>

<a href="{% url 'view_note' note.id %}" class="btn btn-sm btn-outline-primary">
Open
</a>

<a href="{% url 'edit_note' note.id %}" class="btn btn-sm btn-warning">
Edit
</a>

<a href="{% url 'delete_note' note.id %}" class="btn btn-sm btn-danger">
Delete
</a>

</div>

</div>

</div>

{% empty %}

<p class="text-white">No notes yet.</p>

{% endfor %}

</div>

</div>

{% endblock %}
