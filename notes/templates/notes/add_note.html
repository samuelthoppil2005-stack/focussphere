{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

<div class="card p-4 shadow">

<h3 class="text-white mb-3">Add Note</h3>

<form method="POST">

{% csrf_token %}

<input type="text"
name="subject"
placeholder="Subject"
class="form-control mb-3">

<input type="text"
name="title"
placeholder="Note Title"
class="form-control mb-3">

<textarea
name="content"
rows="8"
placeholder="Write your notes..."
class="form-control mb-3">
</textarea>

<button class="btn btn-primary">
Save Note
</button>

</form>

</div>

</div>

{% endblock %}
