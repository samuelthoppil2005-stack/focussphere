<!DOCTYPE html>
<html>

<head>

<title>FocusSphere</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">


<style>

body{
background:#0f172a;
color:white;
font-family:system-ui;
}

.card{
background:#1e293b;
border:none;
border-radius:12px;
}

.table{
color:white;
}

.btn-primary{
background:#2563eb;
border:none;
}

.dashboard-card{
background:#1e293b;
color:white;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

.dashboard-card h5{
margin-bottom:10px;
font-weight:600;
}

.dashboard-card ul{
padding-left:20px;
}

.btn-primary{
background:#3b82f6;
border:none;
color:white;
font-weight:500;
}

.btn-primary:hover{
background:#2563eb;
}

.card{
background:#1e293b;
border-radius:12px;
border:none;
}

.table{
color:white;
}

.card{
background:#1e293b;
color:white;
}

.card p{
color:#e2e8f0;
}

.card h5{
color:white;
}

</style>

</head>
<script>

function toggleMenu(){
document.getElementById("sidebar").classList.toggle("active");
}

</script>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<span class="menu-btn" onclick="toggleMenu()">☰</span>

<h3>FocusSphere</h3>

<div>
👤 {{ request.user.username }}
</div>

</div>


<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<a href="/">🏠 Dashboard</a>
<a href="/timetable">📅 Timetable</a>
<a href="/assignments">📚 Assignments</a>
<a href="/tasks">📝 Tasks</a>
<a href="/attendance">📊 Attendance</a>
<a href="/exams">⏳ Exams</a>
<a href="/notes">📖 Notes</a>
<a href="/files">📂 Files</a>
<a href="{% url 'ai_page' %}">🤖 AI Assistant</a>

</div>


<!-- MAIN CONTENT -->

<div class="main">

{% block content %}

{% endblock %}

<script>
if (Notification.permission !== "granted") {
    Notification.requestPermission();
}

setInterval(async () => {

let response = await fetch("/next-class/")

let data = await response.json()

if(data.notify){

new Notification("Next Class", {
body: data.subject + " starts at " + data.time
})

}

}, 60000)
</script>

</div>

</body>
</html>
