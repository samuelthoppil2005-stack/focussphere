{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

<div class="card p-4 shadow">

<h3 class="text-white mb-3">Add Assignment</h3>

<form method="POST">

{% csrf_token %}

<input type="text"
name="subject"
placeholder="Subject"
class="form-control mb-3">

<input type="text"
name="title"
placeholder="Assignment Title"
class="form-control mb-3">

<input type="date"
name="due_date"
class="form-control mb-3">

<button class="btn btn-primary">
Save Assignment
</button>

</form>

</div>

</div>

{% endblock %}
