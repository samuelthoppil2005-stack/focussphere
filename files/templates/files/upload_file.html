{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

<div class="card p-4 shadow">

<h3 class="text-white mb-3">Upload Study Material</h3>

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

<input
type="text"
name="subject"
placeholder="Subject"
class="form-control mb-3">

<input
type="text"
name="title"
placeholder="File Title"
class="form-control mb-3">

<input
type="file"
name="file"
class="form-control mb-3">

<button class="btn btn-primary">
Upload
</button>

</form>

</div>

</div>

{% endblock %}
