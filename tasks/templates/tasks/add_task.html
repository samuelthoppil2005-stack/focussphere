{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

<div class="card p-4">

<h3 class="text-white mb-3">Add Task</h3>

<form method="post">

{% csrf_token %}

<input type="text" name="title" class="form-control mb-3" placeholder="Task title">

<input type="date" name="due_date" class="form-control mb-3">

<button class="btn btn-primary">Save Task</button>

</form>

</div>

</div>

{% endblock %}
