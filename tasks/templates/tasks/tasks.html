{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

<div class="d-flex justify-content-between align-items-center mb-3"></div>

<h2 class="text-white">Tasks</h2>

<a href="{% url 'add_task' %}" class="btn btn-primary">
➕ Add Task
</a>

</div>

<div class="card shadow p-3">

<table class="table table-hover">

<thead style="background:#111827;color:white;">

<tr>
<th>Title</th>
<th>Due Date</th>
<th style="width:120px;">Actions</th>
</tr>

</thead>

<tbody>

{% for task in tasks %}

<tr>

<td>{{ task.title }}</td>

<td>{{ task.due_date }}</td>

<td class="text-end">

<a href="{% url 'edit_task' task.id %}" class="btn btn-warning btn-sm me-1">
✏ Edit
</a>

<a href="{% url 'delete_task' task.id %}" class="btn btn-danger btn-sm">
🗑 Delete
</a>

</td>

</tr>

{% empty %}

<tr>
<td colspan="3" class="text-center text-muted">
No tasks added yet
</td>
</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

{% endblock %}
