{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

<div class="card p-4 shadow">

<h3 class="text-white mb-3">Add Attendance</h3>

<form method="POST">

{% csrf_token %}

<input type="text"
name="subject"
placeholder="Subject"
class="form-control mb-3">

<input type="number"
name="total_classes"
placeholder="Total Classes"
class="form-control mb-3">

<input type="number"
name="attended_classes"
placeholder="Classes Attended"
class="form-control mb-3">

<button class="btn btn-primary">
Save
</button>

</form>

</div>

</div>

{% endblock %}
