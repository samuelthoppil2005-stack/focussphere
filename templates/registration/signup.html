<!DOCTYPE html>
<html>
<head>
    <title>Signup - FocusSphere</title>

    <style>
        body {
            background: #0f172a;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .box {
            background: #1e293b;
            padding: 30px;
            border-radius: 10px;
            width: 350px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #22c55e;
            border: none;
            color: white;
            border-radius: 5px;
        }

        a {
            color: #60a5fa;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="box">

<h2>Create Account</h2>

<form method="post">
    {% csrf_token %}

    <input type="text" name="username" placeholder="Username" required>

    <input type="password" name="password" placeholder="Password" required>

    <input type="password" name="confirm_password" placeholder="Confirm Password" required>

    <button type="submit">Sign Up</button>
</form>

<p style="margin-top:10px;">
Already have an account?
<a href="/accounts/login/">Login</a>
</p>

</div>

</body>
</html>
